name: Windows EXE Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-exe-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_build.txt

      - name: Run production audit
        run: python prod_audit.py

      - name: Run release gate
        run: python release_check.py

      - name: Build EXE
        shell: cmd
        run: build_exe_windows.bat

      - name: Build clean source archive
        run: python make_release_zip.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalDiaryAutofill-Windows-EXE
          path: dist/MedicalDiaryAutofill.exe
          if-no-files-found: error

      - name: Upload source release artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalDiaryAutofill-Production-Source
          path: release/MedicalDiaryAutofill_PRODUCTION_SOURCE.zip
          if-no-files-found: error
