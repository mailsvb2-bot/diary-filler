name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack project ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Expand-Archive -Path "diary_filler_github_actions_ready_v10.zip" -DestinationPath "_unpacked" -Force
          $app = Get-ChildItem -Path "_unpacked" -Recurse -Filter "zapolnitel_dnevnikov_app.py" | Select-Object -First 1
          if (-not $app) { throw "zapolnitel_dnevnikov_app.py not found inside ZIP" }
          $projectRoot = $app.Directory.Parent.FullName
          "PROJECT_ROOT=$projectRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "PROJECT_ROOT=$projectRoot"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r "$env:PROJECT_ROOT\requirements_build.txt"

      - name: Build portable EXE
        shell: pwsh
        run: |
          Set-Location "$env:PROJECT_ROOT"
          pyinstaller --noconfirm "build\diary_filler_onefile.spec"

      - name: Prepare artifact
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          New-Item -ItemType Directory -Force $releaseDir
          Copy-Item "$env:PROJECT_ROOT\dist\ZapolnitelDnevnikov.exe" "$releaseDir\ZapolnitelDnevnikov.exe"

      - name: Upload ready EXE
        uses: actions/upload-artifact@v4
        with:
          name: ZapolnitelDnevnikov-Windows-EXE
          path: release/*
          retention-days: 30