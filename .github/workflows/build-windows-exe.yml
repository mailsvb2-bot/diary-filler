name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack project ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Expand-Archive -Path "diary_filler_github_actions_ready_v10.zip" -DestinationPath "_unpacked" -Force

          $app = Get-ChildItem -Path "_unpacked" -Recurse -Filter "zapolnitel_dnevnikov_app.py" | Select-Object -First 1
          if (-not $app) {
            throw "zapolnitel_dnevnikov_app.py not found inside ZIP"
          }

          $projectRoot = $app.Directory.Parent.FullName
          "PROJECT_ROOT=$projectRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "PROJECT_ROOT=$projectRoot"
          Write-Host "APP_PATH=$($app.FullName)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r "$env:PROJECT_ROOT\requirements_build.txt"

      - name: Build portable EXE
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $appPath = "$env:PROJECT_ROOT\src\zapolnitel_dnevnikov_app.py"
          $iconPath = "$env:PROJECT_ROOT\assets\app_icon.ico"

          if (-not (Test-Path $appPath)) {
            throw "Application file not found: $appPath"
          }

          if (-not (Test-Path $iconPath)) {
            throw "Icon file not found: $iconPath"
          }

          Set-Location "$env:PROJECT_ROOT"

          $pyinstallerArgs = @(
            "--noconfirm",
            "--clean",
            "--onefile",
            "--windowed",
            "--name", "ZapolnitelDnevnikov",
            "--icon", $iconPath,
            "--collect-all", "PySide6",
            "--collect-all", "docx",
            "--collect-all", "lxml",
            $appPath
          )

          pyinstaller @pyinstallerArgs

      - name: Prepare artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exePath = "$env:PROJECT_ROOT\dist\ZapolnitelDnevnikov.exe"
          if (-not (Test-Path $exePath)) {
            throw "Built EXE not found: $exePath"
          }

          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null
          Copy-Item $exePath "$releaseDir\ZapolnitelDnevnikov.exe"

      - name: Upload ready EXE
        uses: actions/upload-artifact@v4
        with:
          name: ZapolnitelDnevnikov-Windows-EXE
          path: release/*
          retention-days: 30