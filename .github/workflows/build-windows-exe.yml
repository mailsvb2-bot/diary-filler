name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Run smoke test
        shell: pwsh
        run: |
          python smoke_test_combined.py

      - name: Build one-file Windows app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $appPath = "src\main.py"
          if (-not (Test-Path $appPath)) { throw "Application file not found: $appPath" }

          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "MedicalDiaryAutofill" `
            --collect-all docx `
            --collect-all lxml `
            --hidden-import win32api `
            --hidden-import win32print `
            $appPath

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalDiaryAutofill-Windows-EXE
          path: dist/MedicalDiaryAutofill.exe
          retention-days: 30
